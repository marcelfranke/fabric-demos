id: pmi-state-regulatory-monitor
name: pmi-state-regulatory-monitor
version: 1.0.0
services:
  auth:
    enabled: true
    fabric:
      enabled: true
    password:
      enabled: true
    allowedRedirectUris:
      - http://localhost:5173
      - https://avid-poppy-6efd266772-westus.webapp.fabricapps.net
  data:
    enabled: true
    dialect: mssql
  storage:
    enabled: false
  staticHosting:
    enabled: true
    folder: dist
    buildCommand: npm run build:fabric
    indexDocument: index.html
  functions:
    enabled: false
